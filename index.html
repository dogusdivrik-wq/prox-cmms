    Object.entries(reasonCounts).forEach(([r, c]) => { if(c > topReason.count) topReason = { reason: r, count: c }; });

    const globalFaults = allFaults.filter(f => f.type === "ariza");
    const globalDowntime = globalFaults.reduce((sum, f) => sum + (Number(f.downtime)||0), 0);
    const globalMttr = globalFaults.length > 0 ? Math.round(globalDowntime / globalFaults.length) : 0;
    
    const avgOilDays = oilGapCount > 0 ? Math.round((totalOilGaps / oilGapCount) / 86400000) : null;

    return { list: processed, topDowntime, topFaults, topReason, globalMttr, avgOilDays };
  }, [data.machines, data.faults, data.maintenance, data.categories, filtCat, filtMonth]);

  const downloadCSV = (type) => {
    let csvContent = "\uFEFF"; 
    const escapeField = (field) => {
      if (field === null || field === undefined) return '""';
      const str = String(field).replace(/"/g, '""').replace(/\n/g, ' '); 
      return `"${str}"`; 
    };

    if (type === 'faults') {
      csvContent += "Kayıt ID,Makine Adı,Kategori,Kayıt Tipi,Durum,Sebep,Açıklama,Başlangıç Tarihi,Bitiş Tarihi,Duruş Süresi (Dk),Bildiren,Kapatan,Kapatma Notu,Değişen Parçalar\n";
      safeArr(data.faults).forEach(f => {
        if (!f) return;
        const mac = safeArr(data.machines).find(m => m && m.id === f.macId) || {};
        const cat = safeArr(data.categories).find(c => c && c.id === mac.catId) || {};
        const row = [f.id, mac.name || "Silinmiş", cat.name || "Silinmiş", f.type, f.status, f.reason, cleanTag(f.desc), f.start ? toDTL(f.start).replace('T', ' ') : "", f.end ? toDTL(f.end).replace('T', ' ') : "", f.downtime || 0, f.by, f.closedBy, f.closeNote, f.materials].map(escapeField).join(",");
        csvContent += row + "\n";
      });
    } else if (type === 'maint') {
      csvContent += "Kayıt ID,Makine Adı,Kategori,Bakım Şablonu,Tarih,Yapan Kişi,İşaretlenen Kontroller,Notlar\n";
      safeArr(data.maintenance).forEach(m => {
        if (!m) return;
        const mac = safeArr(data.machines).find(mac => mac && mac.id === m.macId) || {};
        const cat = safeArr(data.categories).find(c => c && c.id === mac.catId) || {};
        let tName = m.type;
        const hasCustomTpl = mac.templates && Object.keys(safeObj(mac.templates)).length > 0;
        const tpls = safeObj(hasCustomTpl ? mac.templates : (cat.templates || {}));
        if (tpls[m.type] && tpls[m.type].label) tName = tpls[m.type].label;
        const row = [m.id, mac.name || "Silinmiş", cat.name || "Silinmiş", tName, m.date ? toDTL(m.date).replace('T', ' ') : "", m.by, m.checks, m.notes].map(escapeField).join(",");
        csvContent += row + "\n";
      });
    }
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `ProX_${type === 'faults' ? 'Ariza_Durus' : 'Bakim'}_Raporu_${toYMD(new Date())}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const handleMacCheck = (mac, checked) => {
    if(checked) setBulkMacs([...bulkMacs, mac]);
    else setBulkMacs(bulkMacs.filter(m => m.id !== mac.id));
  };
  
  const handleSelectAllCat = (catId, isSelect) => {
    const catMacs = safeArr(data.machines).filter(m => m && m.catId === catId);
    if (isSelect) {
      const newBulk = [...bulkMacs];
      catMacs.forEach(m => { if (!newBulk.some(x => x.id === m.id)) newBulk.push(m); });
      setBulkMacs(newBulk);
    } else {
      setBulkMacs(bulkMacs.filter(m => !catMacs.some(x => x.id === m.id)));
    }
  };

  return (
    <div style={{padding:24, maxWidth:1200, margin:"0 auto"}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10, marginBottom:20}}>
        <div><h1 style={{fontSize:26, fontWeight:900}}><span style={{color:"var(--blue)"}}>Pro-X</span> CMMS <InfoBtn msg="Bilgisayarlı Bakım Yönetim Sistemi (Computerized Maintenance Management System)" /></h1></div>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          <button className="btn btn-amber" onClick={() => setPg("qr")}>🔳 QR & Barkod</button>
          <button className="btn btn-ghost" onClick={() => setPg("mob")}>📱 Saha Uygulaması</button>
          <button className="btn btn-ghost" onClick={() => checkPw(() => setModal({type:"settings"}))}>⚙️ Ayarlar</button>
          <button className="btn btn-blue" onClick={() => checkPw(() => setModal({type:"add_machine"}))}>+ Makine</button>
          <button className="btn btn-purple" onClick={() => checkPw(() => setModal({type:"add_cat"}))}>📂 Kategoriler</button>
        </div>
      </div>

      <div className="tabs" style={{marginBottom:20, maxWidth:800}}>
        <div className={`tab ${tab==="overview"?"active":""}`} onClick={()=>{setTab("overview"); setBulkMacs([]); setListCatFilter("");}}>📍 Makine Parkuru <InfoBtn msg="Tesisinizdeki tüm makinelerin güncel durumunu ve yaklaşan bakımlarını gösterir." /></div>
        <div className={`tab ${tab==="open"?"active":""}`} onClick={()=>{setTab("open"); setListCatFilter("");}}>🚨 Bekleyenler ({activeFaults.length}) <InfoBtn msg="Sahadan bildirilen ve henüz bakım ekibi tarafından kapatılmamış arıza/duruş kayıtları." /></div>
        <div className={`tab ${tab==="maint"?"active":""}`} onClick={()=>{setTab("maint"); setListCatFilter("");}}>🔔 Bakım Takibi ({maintenanceRadar.length}) <InfoBtn msg="Uzun periyotlu bakımlarda son 3 gün kala, günlük/kısa bakımlarda ise sadece geciktiğinde uyarı veren aciliyet listesi." /></div>
        <div className={`tab ${tab==="analytics"?"active":""}`} onClick={()=>setTab("analytics")}>📈 İstatistik & KPI <InfoBtn msg="Tesisin genel performansını, duruş analizlerini ve temel metrikleri gösterir." /></div>
      </div>

      {tab !== "analytics" && (
        <div style={{display:"flex", gap:10, marginBottom:20, flexWrap:"wrap"}}>
          <div className="search-bar" style={{flex:1, minWidth:250, marginBottom:0}}>
            <span style={{marginRight:10}}>🔍</span>
            <input 
              placeholder="Ara (Makine, kod, marka veya arıza...)" 
              value={tab === "overview" ? search : tab === "open" ? openSearch : maintSearch} 
              onChange={e=>{
                if(tab === "overview") setSearch(e.target.value);
                else if(tab === "open") setOpenSearch(e.target.value);
                else setMaintSearch(e.target.value);
              }} 
            />
          </div>
          {tab === "overview" && (
            <div style={{display:"flex", gap:4, background:"var(--inp)", padding:4, borderRadius:8, border:"1px solid var(--border)"}}>
              <button className={`btn btn-sm ${viewMode==="list"?"btn-blue":"btn-ghost"}`} style={{border:"none"}} onClick={()=>setViewMode("list")}>📄 Liste</button>
              <button className={`btn btn-sm ${viewMode==="grid"?"btn-blue":"btn-ghost"}`} style={{border:"none"}} onClick={()=>setViewMode("grid")}>🏢 Kuşbakışı</button>
            </div>
          )}
          <select className="inp" style={{width:"auto", minWidth:200}} value={listCatFilter} onChange={e=>setListCatFilter(e.target.value)}>
            <option value="">-- Tüm Kategoriler --</option>
            {safeArr(data.categories).map(c => c && <option key={c.id} value={c.id}>{safeStr(c.name)}</option>)}
          </select>
        </div>
      )}

      {tab === "overview" && (
        <ErrorBoundary>
          {safeArr(data.categories).map(cat => {
            if(!cat) return null;
            if(listCatFilter && cat.id !== listCatFilter) return null;
            const macs = safeArr(data.machines).filter(m => m && m.catId === cat.id && (safeStr(m.name).toLowerCase().includes(search.toLowerCase()) || safeStr(m.brand).toLowerCase().includes(search.toLowerCase())));
            if(macs.length === 0) return null;
            
            return (
              <div key={cat.id} style={{marginBottom:24}}>
                <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:"1px solid var(--border)", paddingBottom:8, marginBottom:12}}>
                  <div style={{display:"flex", alignItems:"center", gap:10}}>
                    <h3 style={{fontSize:16, fontWeight:800, color:"var(--dim)"}}>{safeStr(cat.name).toUpperCase()} <span style={{fontSize:12, fontWeight:500}}>({macs.length})</span></h3>
                    <button className="btn btn-ghost btn-xs" onClick={()=>checkPw(()=>setModal({type:"edit_cat", cat}))}>Ayarlar ✏️</button>
                  </div>
                  <div style={{display:"flex", alignItems:"center", gap:6}}>
                    <label className="lbl" style={{marginBottom:0, cursor:"pointer", color:"var(--blue)"}} htmlFor={`chkAll_${cat.id}`}>Tümünü Seç:</label>
                    <input type="checkbox" id={`chkAll_${cat.id}`} className="mac-check" style={{position:"relative", top:0, right:0}} 
                           checked={macs.every(m => bulkMacs.some(x => x.id === m.id))} 
                           onChange={(e) => handleSelectAllCat(cat.id, e.target.checked)} />
                  </div>
                </div>
                
                <div className={viewMode === "list" ? "g-auto" : "g-auto"} style={viewMode === "grid" ? {gridTemplateColumns:"repeat(auto-fill, minmax(75px, 1fr))", gap:6} : {}}>
                  {macs.map(m => {
                    const hasCustomTpl = m.templates && Object.keys(safeObj(m.templates)).length > 0;
                    const tpls = safeObj(hasCustomTpl ? m.templates : (cat?.templates || {}));
                    const mTrackers = [];
                    const todayMs = Date.now();
                    
                    Object.entries(tpls).forEach(([key, tpl]) => {
                      if(!tpl) return;
                      const last = safeArr(data.maintenance).filter(mnt => mnt && mnt.macId === m.id && mnt.type === key).sort((a,b)=>safeTime(b.date)-safeTime(a.date))[0];
                      const pDays = Number(tpl.periodDays) || 0;
                      let diffDays = -999, progress = 0;
                      if(last && last.date && !isNaN(new Date(last.date).getTime())) {
                          const nextMs = new Date(last.date).getTime() + (pDays * 86400000);
                          diffDays = Math.ceil((nextMs - todayMs) / 86400000);
                          progress = pDays > 0 ? Math.min(100, Math.max(0, ((pDays - diffDays) / pDays) * 100)) : 100;
                      }
                      mTrackers.push({ label: tpl.label, diffDays, progress, pDays });
                    });
                    
                    mTrackers.sort((a,b) => a.diffDays - b.diffDays);
                    const isChecked = bulkMacs.some(x => x.id === m.id);
                    
                    // --- DURUM VE ALARM MANTIĞI KONTROL MERKEZİ ---
                    const openTickets = safeArr(data.faults).filter(f => f.macId === m.id && f.status === "open");
                    
                    // Sadece makineyi GERÇEKTEN durduran arıza veya operasyonel duruşları bul (Eğer arızaysa ve [ÇALIŞIYOR] etiketi Varsa yoksay)
                    const activeF = openTickets.find(f => f.type !== "is_emri" && !(f.type === "ariza" && String(f.desc).includes("[ÇALIŞIYOR]")));
                    
                    // Özel İş Emirleri (Tarihi gelmiş mi?)
                    const dueSpecialTask = openTickets.find(f => f.type === "is_emri" && new Date(f.start).getTime() <= todayMs);
                    const pendingSpecialTask = openTickets.find(f => f.type === "is_emri" && new Date(f.start).getTime() > todayMs);
                    
                    // Kutu üstünde görünecek sebep ve tooltip açıklaması
                    let stopReason = activeF ? safeStr(activeF.reason) : "";
                    let openDesc = activeF ? cleanTag(activeF.desc) : ""; 

                    // Renk ve Stil Değişkenleri
                    let cardPulseClass = "";
                    let cardBorderColor = "var(--border)";
                    let cardBg = "rgba(16,185,129,0.05)";
                    let statusLabel = "ÇALIŞIYOR";
                    let statusColor = "var(--text)";
                    let badgeBg = "#10b98120";
                    let badgeColor = "var(--green)";

                    if (m.status === 'fault') { // Makine kırmızıya düşmüşse (Gerçek Arıza)
                       cardPulseClass = 'pulse-fault';
                       cardBorderColor = 'var(--red)';
                       cardBg = 'rgba(239,68,68,0.15)';
                       statusLabel = 'ARIZALI';
                       statusColor = 'var(--red)';
                       badgeBg = '#ef444420';
                       badgeColor = 'var(--red)';
                    } else if (m.status === 'stopped') { // Makine turuncuya düşmüşse (Operasyonel Duruş)
                       cardPulseClass = 'pulse-stopped';
                       cardBorderColor = 'var(--amber)';
                       cardBg = 'rgba(245,158,11,0.15)';
                       statusLabel = 'DURDU';
                       statusColor = 'var(--amber)';
                       badgeBg = '#f59e0b20';
                       badgeColor = 'var(--amber)';
                    } else if (dueSpecialTask) { // Yeşil ama Özel Bakım Vakti Gelmiş (Hızlı Sarı Pulse)
                       cardPulseClass = 'pulse-special-due';
                       cardBorderColor = '#eab308';
                       cardBg = 'rgba(234, 179, 8, 0.15)';
                       statusLabel = 'ÖZEL BAKIM ZAMANI';
                       statusColor = '#eab308';
                       badgeBg = '#eab30820';
                       badgeColor = '#eab308';
                       stopReason = "ÖZEL BAKIM ZAMANI";
                       openDesc = cleanTag(dueSpecialTask.desc);
                    } else if (pendingSpecialTask) { // Yeşil ama İleri Tarihli Özel Bakım Var (Yavaş Sarı Pulse)
                       cardPulseClass = 'pulse-special-pending';
                       cardBorderColor = 'rgba(234, 179, 8, 0.6)';
                       cardBg = 'rgba(234, 179, 8, 0.05)';
                       statusLabel = 'PLANLI İŞ EMRİ';
                       statusColor = '#ca8a04';
                       badgeBg = 'transparent';
                       badgeColor = '#ca8a04';
                       stopReason = "PLANLI İŞ EMRİ";
                       openDesc = cleanTag(pendingSpecialTask.desc);
                    } else { // Yemyeşil tıkır tıkır çalışıyor
                       // Eğer çalışıyor ama "Arıza var fakat durdurmadı" dediyse (Checkbox kapalıysa)
                       const nonStoppingFault = openTickets.find(f => f.type === "ariza" && String(f.desc).includes("[ÇALIŞIYOR]"));
                       if (nonStoppingFault) {
                          cardPulseClass = 'pulse-blue'; // MAVİ YANIP SÖNSÜN (ÇALIŞIYOR AMA KAYIT VAR)
                          cardBorderColor = 'var(--blue)';
                          cardBg = 'rgba(59,130,246,0.1)';
                          statusLabel = "ÇALIŞIYOR (KAYIT VAR)";
                          statusColor = "var(--blue)";
                          badgeBg = "#3b82f620";
                          badgeColor = "var(--blue)";
                          stopReason = safeStr(nonStoppingFault.reason);
                          openDesc = cleanTag(nonStoppingFault.desc);
                       }
                    }

                    // KUŞBAKIŞI GÖRÜNÜM (Açıklama artık Tooltip'te var)
                    if (viewMode === "grid") {
                      return (
                        <div key={m.id} className={`card ${cardPulseClass} clickable-card`}
                             title={openDesc ? `Mevcut Kayıt: ${openDesc}` : safeStr(m.name)}
                             style={{
                               display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                               height: "55px", textAlign: "center", padding: "4px",
                               background: cardBg,
                               border: `2px solid ${cardBorderColor}`,
                               position: "relative", overflow: "hidden"
                             }}
                             onClick={()=>setSelMacDetail({mac:m, cat:cat})}>
                           <input type="checkbox" className="mac-check" style={{position:"absolute", top:2, right:2, width:12, height:12, margin:0}} checked={isChecked} onChange={(e)=>handleMacCheck(m, e.target.checked)} onClick={e=>e.stopPropagation()} title="Toplu Bakım için Seç" />
                           <div style={{fontWeight: 900, fontSize: 11, width:"100%", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", padding:"0 4px", color: statusColor}}>{safeStr(m.name)}</div>
                           <div style={{fontSize: 8, marginTop: 2, fontWeight: 700, color: (m.status === "active" && !dueSpecialTask && !pendingSpecialTask && statusLabel==="ÇALIŞIYOR") ? "var(--dim)" : statusColor}}>
                             {stopReason || statusLabel}
                           </div>
                        </div>
                      );
                    }

                    // LİSTE GÖRÜNÜMÜ (Açıklama direkt altında yazar)
                    return (
                      <div key={m.id} className={`card ${cardPulseClass}`} style={{borderColor: (m.status!=="active" || dueSpecialTask || pendingSpecialTask) ? cardBorderColor : isChecked ? "var(--blue)" : "var(--border)", cursor:"pointer", background: cardBg}} onClick={()=>setSelMacDetail({mac:m, cat:cat})}>
                        <input type="checkbox" className="mac-check" checked={isChecked} onChange={(e)=>handleMacCheck(m, e.target.checked)} onClick={e=>e.stopPropagation()} title="Toplu Bakım için Seç" />
                        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", paddingRight: 30}}>
                          <div>
                             <div style={{fontWeight:800, fontSize:16}}>{safeStr(m.name)}</div>
                             <div style={{fontSize:11, color:"var(--dim)", marginTop:2}}>{safeStr(m.brand)} {safeStr(m.model)}</div>
                             {openDesc && <div style={{fontSize:11, color:statusColor, marginTop:4, fontStyle:"italic", maxWidth:"90%", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>💬 {openDesc}</div>}
                          </div>
                          <div style={{display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6}}>
                            <span className="badge" style={{background: badgeBg, color: badgeColor}}>{stopReason || statusLabel}</span>
                            <button className="btn btn-ghost btn-xs" onClick={(e)=>{e.stopPropagation(); checkPw(()=>setModal({type:"edit_machine", mac:m}));}}>Ayarlar</button>
                          </div>
                        </div>
                        
                        {mTrackers.length > 0 && (
                          <div style={{marginTop: 12, paddingTop: 10, borderTop: "1px dashed var(--border)"}}>
                            {mTrackers.map((tr, idx) => (
                              <div key={idx} style={{marginBottom: 6}}>
                                <div style={{display:"flex", justifyContent:"space-between", fontSize:10, color:"var(--dim)", fontWeight:700, marginBottom:2}}>
                                  <span>{safeStr(tr.label)}</span>
                                  <span style={{color: tr.diffDays < 0 ? "var(--red)" : tr.diffDays <= 3 ? "var(--amber)" : "var(--green)"}}>
                                    {tr.diffDays === -999 ? "Hiç Yapılmadı" : tr.diffDays < 0 ? `${Math.abs(tr.diffDays)} Gün Gecikti` : `${tr.diffDays} Gün Kaldı`}
                                  </span>
                                </div>
                                <div className="mini-prog-bg">
                                   <div className="mini-prog-fill" style={{ width: tr.diffDays === -999 || tr.diffDays < 0 ? '100%' : `${tr.progress}%`, background: tr.diffDays < 0 || tr.diffDays === -999 ? "var(--red)" : tr.diffDays <= 3 ? "var(--amber)" : "var(--green)" }}></div>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
          
          {bulkMacs.length > 0 && (
            <button className="btn btn-blue bulk-btn-float" onClick={()=>checkPw(()=>setShowBulkModal(true))}>
              ⚡ Seçili {bulkMacs.length} Makineye Toplu Bakım Gir
            </button>
          )}
        </ErrorBoundary>
      )}

      {tab === "open" && (
        <ErrorBoundary>
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            {activeFaults.length === 0 ? <div className="card" style={{textAlign:"center", color:"var(--dim)", padding:40}}>Bekleyen iş emri yok.</div> : null}
            {activeFaults.filter(f => {
              const mac = safeArr(data.machines).find(m => m && m.id === f.macId);
              if (!mac) return false; 
              if (listCatFilter && mac?.catId !== listCatFilter) return false;
              
              const mName = mac ? safeStr(mac.name).toLowerCase() : "";
              const term = openSearch.toLowerCase();
              return mName.includes(term) || safeStr(f.desc).toLowerCase().includes(term) || safeStr(f.by).toLowerCase().includes(term);
            }).map(f => {
              const mac = safeArr(data.machines).find(m => m && m.id === f.macId);
              const isEmri = f.type === "is_emri";
              return (
                <div key={f.id} className={`card ${f.type==='ariza'?'pulse-fault': isEmri ? 'pulse-special-due' : 'pulse-stopped'}`} style={{borderLeft: `4px solid ${f.type==="ariza"?"var(--red)":isEmri ? "#eab308" : "var(--amber)"}`}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10}}>
                    <div>
                      <div style={{display:"flex", alignItems:"center", gap:8}}><span style={{fontWeight:800, fontSize:16}}>{safeStr(mac?.name)}</span><span className="badge" style={{background:"var(--inp)", color:isEmri ? "#eab308" :"var(--dim)"}}>{isEmri ? "ÖZEL İŞ EMRİ" : safeStr(f.type).toUpperCase()}</span></div>
                      <div style={{fontSize:12, color:"var(--dim)", marginTop:4}}>{isEmri ? "Planlayan:" : "Bildiren:"} <b style={{color:"var(--text)"}}>{safeStr(f.by)}</b> • {isEmri ? "Hedef:" : "Tarih:"} {fd(f.start)}</div>
                      <div style={{fontSize:14, marginTop:8}}><span style={{fontWeight:800, color:f.type==="ariza"?"var(--red)":"var(--amber)"}}>[{safeStr(f.reason)}]</span> {cleanTag(f.desc)}</div>
                    </div>
                    <button className="btn btn-green" onClick={()=>checkPw(() => setRepTgt(f))}>🔧 {isEmri ? "Bakımı Tamamla" : "Kapat"}</button>
                  </div>
                </div>
              );
            })}
          </div>
        </ErrorBoundary>
      )}

      {tab === "maint" && (
        <ErrorBoundary>
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            {maintenanceRadar.length === 0 && <div className="card" style={{textAlign:"center", color:"var(--dim)", padding:30}}>Yaklaşan veya geciken bakım yok.</div>}
            {maintenanceRadar.filter(r => {
              if (listCatFilter && r.mac?.catId !== listCatFilter) return false;
              return safeStr(r.mac?.name).toLowerCase().includes(maintSearch.toLowerCase());
            }).map((r, i) => (
              <div key={i} className="card clickable-row" style={{borderLeft: `4px solid ${r.diffDays<0?"var(--red)":"var(--amber)"}`}} onClick={()=>setSelMacDetail({mac:r.mac, cat:r.cat})}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                  <div><div style={{fontWeight:800, fontSize:16}}>{safeStr(r.mac?.name)} <span style={{fontSize:12, color:"var(--dim)", fontWeight:500}}>({safeStr(r.cat?.name)})</span></div><div style={{fontSize:13, color:"var(--blue)", marginTop:4}}>{safeStr(r.label)}</div></div>
                  <div style={{textAlign:"right", fontWeight:900, fontSize:15, color:r.diffDays<0?"var(--red)":"var(--amber)"}}>
                    {r.diffDays === -999 ? "HİÇ YAPILMADI!" : r.diffDays < 0 ? `${Math.abs(r.diffDays)} GÜN GECİKTİ!` : `${r.diffDays} Gün Kaldı`}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </ErrorBoundary>
      )}

      {tab === "analytics" && (
        <ErrorBoundary>
          <div>
            <div className="card" style={{background:"var(--inp)", marginBottom:16}}>
               <div className="lbl" style={{marginBottom:10}}>VERİ DIŞA AKTARIM (EXCEL / CSV)</div>
               <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
                  <button className="btn btn-ghost" onClick={()=>downloadCSV('faults')}>⬇️ Arıza & Duruş Raporunu İndir</button>
                  <button className="btn btn-ghost" onClick={()=>downloadCSV('maint')}>⬇️ Planlı Bakım Raporunu İndir</button>
               </div>
               <div style={{fontSize:11, color:"var(--mute)", marginTop:8}}>* İndirilen dosyayı Excel'de açarak gelişmiş filtrelemeler yapabilirsiniz.</div>
            </div>

            <div className="filters">
              <div><label className="lbl">AY <InfoBtn msg="Seçilen aydaki bitmiş duruş ve arızaları hesaplar." /></label><input type="month" className="inp" value={filtMonth} onChange={e=>setFiltMonth(e.target.value)} style={{padding:"6px 10px"}}/></div>
              <div><label className="lbl">KATEGORİ <InfoBtn msg="Sadece seçilen kategoriye ait makineleri listeler." /></label>
                <select className="inp" value={filtCat} onChange={e=>setFiltCat(e.target.value)} style={{padding:"6px 10px"}}>
                  <option value="">Tümü</option>
                  {safeArr(data.categories).map(c => c && <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              {(filtMonth || filtCat) && <button className="btn btn-ghost btn-sm" style={{marginTop:15}} onClick={()=>{setFiltMonth(""); setFiltCat("");}}>Sıfırla</button>}
            </div>

            <div className="grid-4" style={{marginBottom:16}}>
              <div className="card clickable-card" onClick={() => setLeaderboardType('downtime')} style={{background:"var(--inp)", borderLeft:"3px solid var(--red)"}} title="Sıralamayı Görmek İçin Tıklayın">
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                   <div className="lbl" style={{margin:0}}>EN ÇOK DURUŞ YAŞAYAN <InfoBtn msg="Filtrelenen dönemde toplam duruş süresi en yüksek olan makineyi ve genel sıralamasını gösterir."/></div>
                </div>
                <div style={{fontSize:16, fontWeight:800, marginTop:4, color:"var(--red)"}}>{analytics.topDowntime ? safeStr(analytics.topDowntime.name) : "Yok"}</div>
                <div style={{fontSize:12, color:"var(--dim)", marginTop:2}}>{analytics.topDowntime ? `${analytics.topDowntime.totalMins} dk durdu` : "—"}</div>
                <div style={{fontSize:10, color:"var(--blue)", marginTop:8, fontWeight:700, textAlign:"right"}}>Sıralamayı Gör ➔</div>
              </div>
              
              <div className="card clickable-card" onClick={() => setLeaderboardType('faults')} style={{background:"var(--inp)", borderLeft:"3px solid var(--amber)"}} title="Sıralamayı Görmek İçin Tıklayın">
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                   <div className="lbl" style={{margin:0}}>EN ÇOK ARIZA YAPAN <InfoBtn msg="Filtrelenen dönemde en fazla arıza (düzeltici bakım) kaydı açılan makineyi gösterir."/></div>
                </div>
                <div style={{fontSize:16, fontWeight:800, marginTop:4, color:"var(--amber)"}}>{analytics.topFaults ? safeStr(analytics.topFaults.name) : "Yok"}</div>
                <div style={{fontSize:12, color:"var(--dim)", marginTop:2}}>{analytics.topFaults ? `${analytics.topFaults.fCount} kez bozuldu` : "—"}</div>
                <div style={{fontSize:10, color:"var(--blue)", marginTop:8, fontWeight:700, textAlign:"right"}}>Sıralamayı Gör ➔</div>
              </div>
              
              <div className="card" style={{background:"var(--inp)", borderLeft:"3px solid var(--blue)"}}>
                <div className="lbl">ORT. TAMİR SÜRESİ (MTTR) <InfoBtn msg="Mean Time To Repair (Ortalama Tamir Süresi): Bir arızanın bildirilmesiyle kapatılması arasında geçen ortalama dakika."/></div>
                <div style={{fontSize:24, fontWeight:900, marginTop:4, color:"var(--blue)"}}>{analytics.globalMttr} <span style={{fontSize:12}}>dk</span></div>
              </div>
              
              <div className="card" style={{background:"var(--inp)", borderLeft:"3px solid #f97316"}}>
                <div className="lbl">ORT. YAĞ DEĞİŞİM SÜRESİ <InfoBtn msg="Bu kategorideki makinelerin geçmişte 'Yağ' veya 'Oil' geçen bakımları arasında ortalama kaç gün geçtiğini gösterir."/></div>
                <div style={{fontSize:18, fontWeight:800, marginTop:4, color:"#fdba74"}}>{analytics.avgOilDays ? `${analytics.avgOilDays} Gün` : "Veri Yok"}</div>
                <div style={{fontSize:12, color:"var(--dim)", marginTop:2}}>{filtCat ? "Seçili Kategori Ortalaması" : "Tüm Tesis Ortalaması"}</div>
              </div>
            </div>

            <div className="card">
              <table style={{width:"100%"}}>
                <thead><tr style={{background:"var(--inp)"}}>
                  <th>Makine <InfoBtn msg="Makinenin adı ve kodu" /></th>
                  <th>Arıza <InfoBtn msg="Makine kaynaklı bozulmaların sayısı" /></th>
                  <th>Opr. Duruş <InfoBtn msg="Makine çalışmaya hazır olduğu halde dış sebeplerle (tel, kalıp) üretimin durması."/></th>
                  <th>MTTR (Tamir) <InfoBtn msg="Ortalama Tamir Süresi: Bir arızanın bildirilmesiyle kapatılması arasında geçen ortalama süre."/></th>
                  <th>MTBF (Aralık) <InfoBtn msg="Arızalar Arası Ortalama Süre: Bu makine ortalama kaç günde bir bozuluyor?"/></th>
                  <th style={{textAlign:"right"}}>Duruş Süresi <InfoBtn msg="Arıza ve operasyonel duruşların toplam dakika bazında süresi."/></th>
                </tr></thead>
                <tbody>
                  {analytics.list.length === 0 && <tr><td colSpan="6" style={{textAlign:"center", padding:30}}>Kayıt bulunamadı.</td></tr>}
                  {analytics.list.map(m => (
                    <tr key={m.id} className="clickable-row" onClick={()=>{const c = safeArr(data.categories).find(x=>x&&x.id===m.catId); setSelMacDetail({mac:m, cat:c});}}>
                      <td style={{fontWeight:800, color:"var(--blue)"}}>{m.name}</td>
                      <td>{m.fCount}</td>
                      <td>{m.oCount}</td>
                      <td style={{fontWeight:700, color:"var(--amber)"}}>{m.mttr} dk</td>
                      <td style={{fontWeight:700, color:"var(--green)"}}>{m.mtbf}</td>
                      <td style={{fontWeight:900, color:"var(--red)", textAlign:"right", fontSize:15}}>{m.totalMins} dk</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{fontSize:11, color:"var(--dim)", marginTop:10, textAlign:"right"}}>* Makine detaylarını ve tüm geçmişini görmek için satıra tıklayın.</div>
            </div>
          </div>
        </ErrorBoundary>
      )}

      {leaderboardType && (
         <LeaderboardModal 
            type={leaderboardType} 
            data={data} 
            filtMonth={filtMonth} 
            onClose={() => setLeaderboardType(null)} 
            onSelectMac={(m) => {
               setLeaderboardType(null); 
               const c = safeArr(data.categories).find(x => x && x.id === m.catId);
               setSelMacDetail({mac: m, cat: c});
            }} 
         />
      )}

      {showBulkModal && <BulkMaintModal selectedMacs={bulkMacs} data={data} sendData={sendData} onClose={() => {setShowBulkModal(false); setBulkMacs([]); fetchData(true);}} />}
      {selMacDetail && <MachineDetailModal mac={selMacDetail.mac} cat={selMacDetail.cat} data={data} onClose={()=>setSelMacDetail(null)} sendData={sendData} checkPw={checkPw} settings={settings} />}
    </div>
  );
};

// --- MOBİL SAHA UYGULAMASI (ÖZEL İŞ EMRİ EKLENDİ) ---
const Mobile = ({ data, setPg, sendData, initialMacId, setRepTgt }) => {
  const [selCat, setSelCat] = useState(null); 
  const [selMac, setSelMac] = useState(null); 
  const [type, setType] = useState("durus"); 
  const [reason, setReason] = useState("");
  const [desc, setDesc] = useState("");
  const [by, setBy] = useState("");
  const [selTplKey, setSelTplKey] = useState("");
  const [checks, setChecks] = useState({});
  const [formDate, setFormDate] = useState(toDTL(new Date())); 
  const [consumedQr, setConsumedQr] = useState(false);
  const [isSuccess, setIsSuccess] = useState(false); 
  const [isSubmitting, setIsSubmitting] = useState(false); 
  
  const [isMachineStopped, setIsMachineStopped] = useState(true);

  useEffect(() => {
    if(initialMacId && safeArr(data.machines).length > 0 && !consumedQr) {
      const targetMac = safeArr(data.machines).find(m => m && m.id === initialMacId);
      if(targetMac) {
        setSelCat(safeArr(data.categories).find(c => c && c.id === targetMac.catId));
        setSelMac(targetMac);
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      setConsumedQr(true);
    }
  }, [initialMacId, data, consumedQr]);

  const handleSubmit = async () => {
    if(!by) return alert("Ad Soyad zorunludur!");
    if(!formDate) return alert("HATA: Tarih ve saat alanı boş bırakılamaz!"); 
    
    // Özel bakım planlamıyorsak geleceğe tarih girilemez
    if (type !== "is_emri" && new Date(formDate) > new Date()) {
       return alert("HATA: Arıza veya normal bakım için ileri bir tarih seçemezsiniz!");
    }

    setIsSubmitting(true); 
    const isoDate = formDate; 

    if(type === "bakim") {
      if(!selTplKey) { setIsSubmitting(false); return alert("Lütfen şablon seçin!"); }
      const hasCustomTpl = selMac?.templates && Object.keys(safeObj(selMac.templates)).length > 0;
      const tpls = safeObj(hasCustomTpl ? selMac.templates : (selCat?.templates || {}));
      const tpl = tpls[selTplKey];
      if(!tpl) { setIsSubmitting(false); return alert("Seçili şablon bulunamadı!"); } 
      const doneItems = safeArr(tpl.items).filter((_, i) => checks[i]); 
      if(doneItems.length === 0) { setIsSubmitting(false); return alert("Kontrol maddesi işaretlemediniz!"); }
      const success = await sendData("log_maint", { id: "MNT-"+uid(), machineId: selMac.id, maintType: selTplKey, person: by, checks: doneItems.join(", "), notes: desc, customDate: isoDate });
      setIsSubmitting(false); 
      if(success) { setIsSuccess(true); } 
      return;
    }
    
    if(!desc) { setIsSubmitting(false); return alert("Açıklama zorunludur!"); }
    if((type === "ariza" || type === "durus") && !reason) { setIsSubmitting(false); return alert("Sebep seçimi zorunludur!"); }
    
    let finalDesc = desc;
    if (type === "ariza") {
        finalDesc = (isMachineStopped ? "[MAKİNE DURDU]\n" : "[ÇALIŞIYOR]\n") + desc;
    }

    // Özel İş Emri (Custom Maintenance) olarak kaydediyoruz
    const finalReason = type === "is_emri" ? "Özel Planlı Bakım" : reason;

    const success = await sendData("report_fault", { id: "FLT-"+uid(), machineId: selMac.id, type, reason: finalReason, desc: finalDesc, reportedBy: by, customDate: isoDate });
    setIsSubmitting(false); 
    if(success) { setIsSuccess(true); } 
  };

  if (isSuccess) {
      return (
          <div style={{maxWidth:450, margin:"0 auto", padding:16}}>
            <div className="card" style={{textAlign:"center", padding:"40px 20px", border:"2px solid var(--green)", background:"rgba(16,185,129,0.05)"}}>
              <div style={{fontSize:50, marginBottom:16}}>✅</div>
              <h2 style={{color:"var(--green)", marginBottom:10, fontWeight:900}}>İşlem Başarılı!</h2>
              <p style={{color:"var(--text)", fontSize:14, marginBottom:24}}>Kayıt sisteme kaydedildi. Bu sekmeyi güvenle kapatabilirsiniz.</p>
              <button className="btn btn-ghost" style={{justifyContent:"center", width:"100%"}} onClick={() => {setIsSuccess(false); setSelMac(null); setSelCat(null); setPg("dash");}}>Ana Panele Dön</button>
            </div>
          </div>
      );
  }

  if (!selCat && !selMac) return (
    <div style={{maxWidth:450, margin:"0 auto", padding:16}}>
      <ErrorBoundary>
        <div style={{textAlign:"center", marginBottom:24}}><h2 style={{fontSize:22, fontWeight:900}}>Kategori Seçin</h2></div>
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {safeArr(data.categories).map(c => {
            if(!c) return null;
            return <div key={c.id} className="card clickable-row" style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:20}} onClick={()=>setSelCat(c)}><span style={{fontWeight:800, fontSize:16}}>{safeStr(c.name)}</span><span style={{color:"var(--dim)"}}>→</span></div>
          })}
          <button className="btn btn-ghost" style={{justifyContent:"center", marginTop:20}} onClick={()=>setPg("dash")}>Ana Panele Dön</button>
        </div>
      </ErrorBoundary>
    </div>
  );

  if (selCat && !selMac) return (
    <div style={{maxWidth:450, margin:"0 auto", padding:16}}>
      <ErrorBoundary>
        <button className="btn btn-ghost btn-sm" style={{marginBottom:16}} onClick={()=>setSelCat(null)}>← Geri</button>
        <h2 style={{fontSize:20, fontWeight:900, marginBottom:16}}>{safeStr(selCat.name)} Seçiniz</h2>
        <div style={{display:"flex", flexDirection:"column", gap:10}}>
          {safeArr(data.machines).filter(m => m && m.catId === selCat.id).map(m => (
            <div key={m.id} className="card clickable-row" style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderColor: m.status!=="active"?"var(--red)":"var(--border)"}} onClick={()=>{setSelMac(m); setType("durus");}}>
              <div style={{fontWeight:800, fontSize:15}}>{safeStr(m.name)}</div>
              <span className="badge" style={{background:"var(--inp)", color:m.status==="active"?"var(--green)":"var(--red)"}}>{m.status==="active"?"SEÇ":"DURUYOR"}</span>
            </div>
          ))}
        </div>
      </ErrorBoundary>
    </div>
  );

  if (selMac) {
    const hasCustomTpl = selMac?.templates && Object.keys(safeObj(selMac.templates)).length > 0;
    const tpls = safeObj(hasCustomTpl ? selMac.templates : (selCat?.templates || {}));
    const hasTemplates = Object.keys(tpls).length > 0;
    
    const openFaults = safeArr(data.faults).filter(f => f && f.status === "open" && f.macId === selMac.id);

    return (
      <div style={{maxWidth:450, margin:"0 auto", padding:16}}>
        <ErrorBoundary>
          <button className="btn btn-ghost btn-sm" style={{marginBottom:16}} onClick={()=>setSelMac(null)}>← Makinelere Dön</button>
          <div className="card" style={{marginBottom:16, borderBottom:"3px solid var(--blue)"}}>
            <div style={{fontWeight:900, fontSize:20}}>{safeStr(selMac?.name)}</div>
            <div style={{fontSize:12, color:"var(--dim)", marginTop:2}}>{safeStr(selCat?.name)} • {safeStr(selMac?.brand)}</div>
          </div>

          <div className="tabs" style={{marginBottom:16, flexWrap:"wrap"}}>
            <div className={`tab ${type==="durus"?"active":""}`} style={type==="durus"?{background:"var(--amber)",color:"#000"}:{}} onClick={()=>{setType("durus"); setIsMachineStopped(true);}}>🟠 Duruş</div>
            <div className={`tab ${type==="ariza"?"active":""}`} style={type==="ariza"?{background:"var(--red)",color:"#fff"}:{}} onClick={()=>{setType("ariza"); setIsMachineStopped(true);}}>🔴 Arıza</div>
            <div className={`tab ${type==="bakim"?"active":""}`} style={type==="bakim"?{background:"var(--green)",color:"#fff"}:{}} onClick={()=>setType("bakim")}>🟢 Bakım</div>
            <div className={`tab ${type==="is_emri"?"active":""}`} style={type==="is_emri"?{background:"#eab308",color:"#000"}:{}} onClick={()=>{setType("is_emri"); setFormDate(toDTL(new Date(Date.now() + 86400000)));}}>📅 Özel Plan</div>
            <div className={`tab ${type==="open"?"active":""}`} style={type==="open"?{background:"var(--purple)",color:"#fff"}:{}} onClick={()=>setType("open")}>🔧 Açıklar ({openFaults.length})</div>
          </div>

          <div className="card">
            
            {type === "open" ? (
               <div style={{display:"flex", flexDirection:"column", gap:12}}>
                 {openFaults.length === 0 ? <div style={{textAlign:"center", color:"var(--dim)", padding:20}}>Bu makinede açık iş emri yok.</div> : null}
                 {openFaults.map(f => (
                   <div key={f.id} style={{padding:12, background:"var(--inp)", borderRadius:8, borderLeft: `4px solid ${f.type==="ariza"?"var(--red)":f.type==="is_emri"?"#eab308":"var(--amber)"}`}}>
                      <div style={{fontSize:11, color:"var(--mute)", marginBottom:4}}>{fd(f.start)} • Plan/Bildiren: {safeStr(f.by)}</div>
                      <div style={{fontSize:14, fontWeight:"bold", color:"var(--text)"}}><span style={{color:f.type==="is_emri"?"#eab308":"var(--amber)"}}>[{f.type==="is_emri"?"ÖZEL BAKIM":safeStr(f.reason)}]</span> {cleanTag(f.desc)}</div>
                      <button className="btn btn-green btn-sm" style={{width:"100%", marginTop:12, justifyContent:"center"}} onClick={() => setRepTgt(f)}>Müdahale Et & Kapat</button>
                   </div>
                 ))}
               </div>
            ) : (
              <div style={{display:"flex", flexDirection:"column", gap:14}}>
                {(type === "durus" || type === "ariza" || type === "is_emri") && (
                  <>
                    <div>
                      <label className="lbl">{type === "is_emri" ? "Hedef Tarih / Saat (Gelecek Seçin) *" : "Kayıt Tarihi / Saati"}</label>
                      <input type="datetime-local" className="inp" value={formDate} onChange={e=>setFormDate(e.target.value)} />
                    </div>
                    
                    {type === "ariza" && (
                      <div style={{background:"var(--bg)", padding:12, borderRadius:8, border:"1px solid var(--border)", display:"flex", alignItems:"center", gap:10}}>
                          <input type="checkbox" id="chkStopRep" checked={isMachineStopped} onChange={e=>setIsMachineStopped(e.target.checked)} style={{width:20, height:20, cursor:"pointer"}} />
                          <label htmlFor="chkStopRep" style={{fontWeight:700, cursor:"pointer", color:"var(--text)"}}>Bu arıza makineyi durdurdu</label>
                      </div>
                    )}
                    
                    {type !== "is_emri" && (
                      <div><label className="lbl">Sebep *</label>
                        <select className="inp" value={reason} onChange={e=>setReason(e.target.value)}>
                          <option value="">-- Sebep Seçin --</option>
                          {type === "ariza" && <><option>Mekanik</option><option>Elektrik</option><option>Hidrolik/Pnömatik</option></>}
                          {type === "durus" && safeArr(selCat?.reasons).map(r => <option key={r} value={r}>{r}</option>)}
                          <option value="Diğer">Diğer...</option>
                        </select>
                      </div>
                    )}
                    
                    <div><label className="lbl">{type === "is_emri" ? "Neler Yapılacak? (Detaylı yazın) *" : "Açıklama *"}</label>
                         <textarea className="inp" value={desc} onChange={e=>setDesc(e.target.value)} placeholder={type==="is_emri"?"Örn: Ana şanzıman sökülüp bilyaları kontrol edilecek...":""} />
                    </div>
                  </>
                )}

                {type === "bakim" && (
                  <>
                    {!hasTemplates ? (
                      <div style={{padding:15, color:"var(--red)", textAlign:"center"}}>Bakım şablonu tanımlanmamış.</div>
                    ) : (
                      <>
                        <div><label className="lbl">Kayıt Tarihi / Saati</label>
                          <input type="datetime-local" className="inp" value={formDate} onChange={e=>setFormDate(e.target.value)} />
                        </div>
                        <div><label className="lbl">Bakım Tipi *</label>
                          <select className="inp" value={selTplKey} onChange={e=>{setSelTplKey(e.target.value); setChecks({});}}>
                            <option value="">-- Şablon Seçin --</option>
                            {Object.entries(tpls).map(([k, v]) => {
                              if(!v) return null;
                              return <option key={k} value={k}>{safeStr(v.label)}</option>;
                            })}
                          </select>
                        </div>
                        {selTplKey && tpls[selTplKey] && tpls[selTplKey].items && (
                          <div><label className="lbl">Kontrol Listesi</label>
                            <div style={{display:"flex", flexDirection:"column", gap:6}}>
                              {safeArr(tpls[selTplKey].items).map((item, i) => (
                                <div key={i} className={`chk-item ${checks[i]?"done":""}`} onClick={()=>setChecks({...checks, [i]:!checks[i]})}>
                                  <div className={`chkbox ${checks[i]?"done":""}`}>{checks[i]?"✓":""}</div>
                                  <span style={{fontSize:13}}>{safeStr(item)}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                        <div><label className="lbl">Notlar</label><textarea className="inp" value={desc} onChange={e=>setDesc(e.target.value)} /></div>
                      </>
                    )}
                  </>
                )}
                
                {(type !== "bakim" || hasTemplates) && (
                  <>
                    <div><label className="lbl">Ad Soyad *</label><input className="inp" value={by} onChange={e=>setBy(e.target.value)} /></div>
                    <button className="btn" style={{background: type==="ariza"?"var(--red)":type==="durus"?"var(--amber)":type==="is_emri"?"#eab308":"var(--green)", color:type==="durus"||type==="is_emri"?"#000":"#fff", justifyContent:"center", padding:14, fontSize:15, opacity: isSubmitting ? 0.7 : 1}} onClick={handleSubmit} disabled={isSubmitting}>
                      {isSubmitting ? "⏳ KAYDEDİLİYOR..." : (type==="is_emri" ? "KAYDET & PLANA EKLE" : "GÖNDER")}
                    </button>
                  </>
                )}
              </div>
            )}
          </div>
        </ErrorBoundary>
      </div>
    );
  }
};

// --- ANA UYGULAMA (APP) ---
function App() {
  const [data, setData] = useState({ categories: [], machines: [], faults: [], maintenance: [] });
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  
  const [settings, setSettings] = useState(() => {
    try {
      const saved = localStorage.getItem("prox_settings");
      return saved ? JSON.parse(saved) : { shiftStart: "08:00", shiftEnd: "17:30" };
    } catch(e) { return { shiftStart: "08:00", shiftEnd: "17:30" }; }
  });

  const updateSettings = (newSet) => {
    setSettings(newSet);
    localStorage.setItem("prox_settings", JSON.stringify(newSet));
    showToast("Ayarlar Kaydedildi!");
  };
  
  const urlParams = new URLSearchParams(window.location.search);
  const qrMacId = urlParams.get('mac');
  
  const [pg, setPg] = useState(qrMacId ? "mob" : "dash"); 
  const [modal, setModal] = useState(null); 
  const [pwUnlocked, setPwUnlocked] = useState(false);
  const [repTgt, setRepTgt] = useState(null);

  const showToast = m => { setToast(m); setTimeout(() => setToast(null), 2500); };
  
  const checkPw = (cb) => {
    if(pwUnlocked) { cb(); return; }
    const p = prompt("Yönetici Şifresi (PIN):");
    if(p === "137998") { setPwUnlocked(true); cb(); } else if(p !== null) alert("Yanlış Şifre!");
  };

  const fetchData = (silent = false) => {
    if(!silent) setLoading(true);
    fetch(GOOGLE_SCRIPT_URL)
      .then(r => r.json())
      .then(resp => {
        if(resp.result === "success") {
          const cats = safeArr(resp.data.categories).slice(1).map(r => ({ id: r[0], name: r[1], reasons: safeArr(parseJSON(r[2], [])), templates: safeObj(parseJSON(r[3], {})) }));
          let macs = safeArr(resp.data.machines).slice(1).map(r => ({ id: r[0], catId: r[1], name: r[2], brand: r[3], model: r[4], status: r[5], templates: safeObj(parseJSON(r[6], {})) }));
          const flts = safeArr(resp.data.faults).slice(1).map(r => ({ id: r[0], macId: r[1], type: r[2], reason: r[3], desc: r[4], by: r[5], start: r[6], status: r[7], closedBy: r[8], closeNote: r[9], materials: r[10], end: r[11], downtime: r[12] }));
          const mnts = safeArr(resp.data.maintenance).slice(1).map(r => ({ id: r[0], macId: r[1], type: r[2], by: r[3], date: r[4], checks: r[5], notes: r[6] }));
          
          macs = macs.map(m => {
             const openF = flts.filter(f => f.macId === m.id && f.status === "open");
             let isStopped = false, isFault = false;
             openF.forEach(f => {
                 if (f.type === "durus") isStopped = true;
                 if (f.type === "ariza" && !String(f.desc).includes("[ÇALIŞIYOR]")) isFault = true;
             });
             
             let realStatus = "active"; 
             
             if (isFault) realStatus = "fault"; 
             else if (isStopped) realStatus = "stopped"; 
             
             return { ...m, status: realStatus };
          });

          setData({ categories: cats, machines: macs, faults: flts, maintenance: mnts });
        }
        if(!silent) setLoading(false);
      }).catch(e => { if(!silent) setLoading(false); showToast("Bağlantı Hatası"); });
  };

  useEffect(() => { 
    fetchData(); 
    const intv = setInterval(() => fetchData(true), 60000);
    return () => clearInterval(intv);
  }, []);

  const sendData = (action, payload, silent = false) => {
    if(!silent) setLoading(true);
    const d = new URLSearchParams(); d.append("action", action);
    for(const key in payload) d.append(key, payload[key]);
    return fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: d, headers: { "Content-Type": "application/x-www-form-urlencoded" }})
      .then(r => r.json())
      .then(resp => {
        if(!silent) setLoading(false);
        if(resp.result === "success") { if(!silent){showToast("İşlem Başarılı!"); fetchData(true);} return true; } 
        else { alert("Hata: " + resp.message); return false; }
      }).catch(e => { if(!silent) setLoading(false); alert("Bağlantı Hatası"); return false; });
  };

  return (
    <ErrorBoundary>
      <div>
        {toast && <div className="toast">{toast}</div>}
        {loading && <div className="loading"><div className="spinner"></div><div>Veriler Eşitleniyor...</div></div>}
        
        {pg === "dash" && <Dash data={data} setPg={setPg} checkPw={checkPw} setModal={setModal} setRepTgt={setRepTgt} sendData={sendData} fetchData={fetchData} settings={settings} />}
        {pg === "mob" && <Mobile data={data} setPg={setPg} sendData={sendData} initialMacId={qrMacId} setRepTgt={setRepTgt} />}
        {pg === "qr" && <QRPage data={data} setPg={setPg} />}
        
        {modal?.type === "settings" && <SettingsModal settings={settings} onClose={() => setModal(null)} onSave={updateSettings} />}
        {modal?.type === "add_cat" && <CategoryManagerModal onClose={() => setModal(null)} sendData={sendData} data={data} />}
        {modal?.type === "edit_cat" && <CategoryManagerModal cat={modal.cat} onClose={() => setModal(null)} sendData={sendData} data={data} />}
        {modal?.type === "add_machine" && <MachineManagerModal categories={data.categories} onClose={() => setModal(null)} sendData={sendData} data={data} />}
        {modal?.type === "edit_machine" && <MachineManagerModal mac={modal.mac} categories={data.categories} onClose={() => setModal(null)} sendData={sendData} data={data} />}
        
        {repTgt && <RepairModal repTgt={repTgt} onClose={() => setRepTgt(null)} sendData={sendData} settings={settings} />}
      </div>
    </ErrorBoundary>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
